name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 branch / PR 上有新 push 时取消上一次仍在跑的 CI，省 runner 时间。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ⚠️ CI 用 node 20.19（npm 10），不能升 node 24。
      # 单测 `npm test` 用 electron 作 ABI 对齐的 node 运行（ELECTRON_RUN_AS_NODE=1），
      # 依赖 node_modules/electron 的二进制装好；而 node 24 自带的 npm 11 会让 electron
      # 的 postinstall 二进制下载不完整、不写 path.txt → electron 启动报
      # "failed to install correctly"，单测直接崩。release.yml 需要 node 24 跑 pack.mts
      # 的类型擦除，但它不跑 electron-as-node，故两个 workflow node 版本可以不同。
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.19'
          cache: 'npm'

      # postinstall 会跑 rebuild-native.js + setup-ai-docs.js
      # 第二步在 macOS 创建 symlink，在 Windows 缺 Developer Mode 时 fallback 到文件 copy
      # GITHUB_TOKEN：@vscode/ripgrep postinstall 用它鉴权 GitHub API 下载预编译二进制，
      # 否则匿名请求会撞 403 限流（api.github.com/repos/microsoft/ripgrep-prebuilt）。
      - name: Install dependencies
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 主进程 / preload / renderer 三段编译 + mixed-import 守卫
      - name: Typecheck
        run: npm run typecheck

      # vitest 通过 Electron Node 运行（ELECTRON_RUN_AS_NODE=1），匹配 better-sqlite3 ABI
      - name: Unit tests
        run: npm test

      # electron-vite build → out/  (不打包，仅 smoke 编译)
      - name: Build smoke
        run: npm run build
