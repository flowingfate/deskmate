<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self' data:;
        connect-src 'self' https:<%= connectSrcExtra %>;
    ">
    <title>
        <%= htmlWebpackPlugin.options.title %>
    </title>
    <script>
        // Output logs at the beginning of the page
        console.log('🔧 [TOOLBAR HTML] ToolBar page script execution started');
        console.log('🔧 [TOOLBAR HTML] Current time:', new Date().toLocaleString());
        console.log('🔧 [TOOLBAR HTML] User agent:', navigator.userAgent);

        // Global polyfill for Electron renderer process
        if (typeof global === 'undefined') {
            var global = globalThis;
        }
        window.global = global;

        // Set toolbar-specific flag
        window.isToolBarWindow = true;

        console.log('🔧 [TOOLBAR HTML] Global variables setup completed');
        console.log('🔧 [TOOLBAR HTML] ToolBar window flag set');
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: rgba(255, 255, 255, 0.95);
            color: #000000;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 14px;
            color: #666;
        }

        .loading::after {
            content: '';
            width: 16px;
            height: 16px;
            margin-left: 8px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">Loading ToolBar</div>
    </div>
    <%- entryScript %>
</body>
</html>
